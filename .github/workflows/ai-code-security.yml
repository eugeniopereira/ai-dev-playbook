name: AI Code Security Validation

on:
  pull_request:
    branches: [ main, master, develop, staging ]
  push:
    branches: [ main, master, develop, staging ]

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better secret detection

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Semgrep SAST Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
            p/java
            p/python
            p/javascript
        env:
          SEMGREP_RULES: auto

      - name: GitLeaks Credential Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }} # Optional

      - name: Security Scan Summary
        if: always()
        run: |
          echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ TruffleHog: Secrets detection" >> $GITHUB_STEP_SUMMARY
          echo "✅ Semgrep: SAST analysis" >> $GITHUB_STEP_SUMMARY
          echo "✅ GitLeaks: Credential scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Se este workflow falhou, revise os logs acima." >> $GITHUB_STEP_SUMMARY
          echo "**Não faça merge até corrigir todas as vulnerabilidades críticas.**" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## ⚠️ Security Scan Failed\n\n' +
                    'Vulnerabilidades de segurança foram encontradas neste PR.\n\n' +
                    '**Action required**:\n' +
                    '1. Revise os logs do workflow\n' +
                    '2. Corrija as vulnerabilidades encontradas\n' +
                    '3. Push das correções\n' +
                    '4. Aguarde novo scan\n\n' +
                    '**Não faça merge até este check passar.** ✅\n\n' +
                    'Veja o [Security Validation Checklist](../docs/security-validation-checklist.md) para guidance.'
            })

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for AI-assisted tag
        id: check-ai
        run: |
          # Verifica se commit menciona IA
          if git log -1 --pretty=%B | grep -iE "(Claude|Copilot|Gemini|AI-assisted)"; then
            echo "ai_assisted=true" >> $GITHUB_OUTPUT
            echo "✅ Código gerado com assistência de IA detectado"
          else
            echo "ai_assisted=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Código tradicional (sem tag IA)"
          fi

      - name: Complexity Check (AI code)
        if: steps.check-ai.outputs.ai_assisted == 'true'
        run: |
          echo "## 🤖 AI-Assisted Code Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Este PR contém código gerado com assistência de IA." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Checklist obrigatório**:" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Security scan passou" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Code review por 2 pessoas" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Testes cobrem código novo" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Sem hard-coded credentials" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Complexidade aceitável" >> $GITHUB_STEP_SUMMARY

      - name: AI Code Reminder
        if: steps.check-ai.outputs.ai_assisted == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🤖 AI-Assisted Code Detected\n\n' +
                    'Este PR foi identificado como contendo código gerado com assistência de IA.\n\n' +
                    '**Review checklist**:\n' +
                    '- [ ] Security scan passou ✅\n' +
                    '- [ ] 2 peer reviews obrigatórios\n' +
                    '- [ ] Testes adequados\n' +
                    '- [ ] Sem credentials hard-coded\n' +
                    '- [ ] Complexidade aceitável (cyclomatic < 15)\n\n' +
                    'Consulte [Security Validation Checklist](../docs/security-validation-checklist.md) para detalhes.'
            })
